<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Enrollment Form</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <script src="http://login2explore.com/jpdb/resources/js/0.0.3/jpdb-commons.js"></script>
    <style>
        form {
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
            margin: 0 auto;
        }
        h2 {
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <form id="studentForm">
        <h2>Student Enrollment Form</h2>
        <div class="form-group">
            <label>Roll No</label>
            <input type="text" class="form-control" id="rollNo" placeholder="Enter Roll Number"
                onchange="getStudent();">
        </div>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" class="form-control" id="fullName" placeholder="Enter Full Name">
        </div>
        <div class="form-group">
            <label>Class</label>
            <input type="text" class="form-control" id="studentClass" placeholder="Enter Class">
        </div>
        <div class="form-group">
            <label>Birth Date</label>
            <input type="date" class="form-control" id="birthDate">
        </div>
        <div class="form-group">
            <label>Address</label>
            <textarea class="form-control" rows="3" id="address" placeholder="Enter Address"></textarea>
        </div>
        <div class="form-group">
            <label>Enrollment Date</label>
            <input type="date" class="form-control" id="enrollDate">
        </div>
        <br>
        <input type="button" id="saveBtn" class="btn btn-success" value="Save" onclick="saveData();">
        <input type="button" id="updateBtn" class="btn btn-warning" value="Update" onclick="updateData();">
        <input type="button" id="resetBtn" class="btn btn-danger" value="Reset" onclick="resetForm();">
    </form>
    <script src="script.js"></script>
</body>
</html>
